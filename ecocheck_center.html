<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生態檢核入門到實務操作 - 自主學習系統</title>
    <style>
        /* ================= CSS 變數與主題 ================= */
        :root {
            --primary: #2C5F2D; /* 森林綠 */
            --primary-light: #97BC62;
            --primary-dark: #1e421f;
            --secondary: #1C3F60; /* 深藍 */
            --bg-body: #F4F1EA; /* 米白 */
            --bg-card: #FFFFFF;
            --bg-sidebar: #22252A;
            --text-main: #333333;
            --text-muted: #666666;
            --text-sidebar: #E8E8E8;
            --alert-bg: #FEECE8;
            --alert-border: #E07A5F;
            --alert-text: #B03A2E;
            --success: #27AE60;
            --border: #E0E0E0;
            --shadow: 0 4px 6px rgba(0,0,0,0.05);
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --primary: #97BC62;
            --primary-light: #2C5F2D;
            --primary-dark: #b8d492;
            --secondary: #4A7C59;
            --bg-body: #18191A;
            --bg-card: #242526;
            --bg-sidebar: #121212;
            --text-main: #E4E6EB;
            --text-muted: #B0B3B8;
            --text-sidebar: #E4E6EB;
            --alert-bg: #3A2622;
            --alert-border: #E07A5F;
            --alert-text: #FFA08B;
            --success: #4CAF50;
            --border: #3A3B3C;
            --shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* ================= 基礎設定 ================= */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; transition: var(--transition); }
        h1, h2, h3, h4 { color: var(--secondary); margin-bottom: 0.5rem; }
        [data-theme="dark"] h1, [data-theme="dark"] h2, [data-theme="dark"] h3, [data-theme="dark"] h4 { color: var(--primary); }
        a { color: var(--primary); text-decoration: none; }
        ul { padding-left: 1.5rem; margin-bottom: 1rem; }
        p { line-height: 1.6; margin-bottom: 1rem; }

        /* ================= 佈局 ================= */
        .sidebar { width: 300px; background-color: var(--bg-sidebar); color: var(--text-sidebar); display: flex; flex-direction: column; transition: var(--transition); z-index: 100;}
        .sidebar-header { padding: 1.5rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h2 { color: #fff; font-size: 1.2rem; margin-bottom: 0.5rem; }
        
        .progress-container { margin-top: 1rem; }
        .progress-text { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.3rem; }
        .progress-bar-bg { width: 100%; height: 8px; background-color: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background-color: var(--primary-light); width: 0%; transition: width 0.5s ease; }

        .nav-list { flex: 1; overflow-y: auto; padding: 1rem 0; list-style: none; margin: 0; }
        .nav-item { padding: 0.8rem 1.5rem; cursor: pointer; display: flex; align-items: center; border-left: 4px solid transparent; transition: var(--transition); font-size: 0.95rem; color: #aaa; }
        .nav-item:hover { background-color: rgba(255,255,255,0.05); color: #fff; }
        .nav-item.active { border-left-color: var(--primary-light); background-color: rgba(255,255,255,0.1); color: #fff; font-weight: bold; }
        .nav-item.completed { color: #8bc34a; }
        .nav-item-icon { margin-right: 10px; font-size: 1.2rem; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { height: 60px; background-color: var(--bg-card); display: flex; justify-content: space-between; align-items: center; padding: 0 2rem; box-shadow: var(--shadow); z-index: 10; }
        
        .content-area { flex: 1; overflow-y: auto; padding: 2rem; scroll-behavior: smooth; }
        .container { max-width: 900px; margin: 0 auto; }

        /* ================= 卡片與區塊 ================= */
        .card { background-color: var(--bg-card); border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .card-title { display: flex; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 1rem; }
        .card-title i { margin-right: 0.5rem; font-size: 1.2rem; }

        /* 目標與概念區 */
        .obj-tag { display: inline-block; background-color: rgba(44, 95, 45, 0.1); color: var(--primary); padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.85rem; margin: 0 0.5rem 0.5rem 0; font-weight: bold; }
        [data-theme="dark"] .obj-tag { background-color: rgba(151, 188, 98, 0.2); }

        /* 情境案例 */
        .scenario-box { background-color: rgba(28, 63, 96, 0.05); border-left: 4px solid var(--secondary); padding: 1rem 1.5rem; border-radius: 0 8px 8px 0; margin-bottom: 1rem; }
        [data-theme="dark"] .scenario-box { background-color: rgba(74, 124, 89, 0.1); border-left-color: var(--primary); }

        /* 錯誤提醒 */
        .alert-box { background-color: var(--alert-bg); border-left: 4px solid var(--alert-border); padding: 1rem 1.5rem; color: var(--alert-text); border-radius: 0 8px 8px 0; margin-bottom: 1rem; }
        
        /* 測驗區 */
        .quiz-option { display: block; padding: 1rem; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 0.5rem; cursor: pointer; transition: var(--transition); background-color: var(--bg-body); }
        .quiz-option:hover { border-color: var(--primary); background-color: rgba(44, 95, 45, 0.05); }
        .quiz-option input { margin-right: 10px; }
        .quiz-option.correct { background-color: rgba(39, 174, 96, 0.1); border-color: var(--success); }
        .quiz-option.wrong { background-color: var(--alert-bg); border-color: var(--alert-border); }
        
        .feedback { margin-top: 1rem; padding: 1rem; border-radius: 6px; display: none; font-weight: bold; }
        .feedback.success { display: block; background-color: rgba(39, 174, 96, 0.1); color: var(--success); }
        .feedback.error { display: block; background-color: var(--alert-bg); color: var(--alert-text); }

        /* ================= 按鈕與控制 ================= */
        .btn { padding: 0.6rem 1.2rem; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: var(--transition); font-size: 0.95rem; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--primary-dark); }
        .btn-primary:disabled { background-color: #ccc; cursor: not-allowed; }
        .btn-outline { background-color: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { background-color: var(--bg-body); }

        .theme-toggle { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-main); }
        
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); }

        /* ================= 結訓證書 ================= */
        .certificate { display: none; text-align: center; padding: 3rem; background: linear-gradient(135deg, var(--bg-card), var(--bg-body)); border: 2px solid #D4AF37; border-radius: 12px; margin-top: 2rem; }
        .cert-title { font-size: 2rem; color: #D4AF37; margin-bottom: 1rem; }
        .cert-badge { font-size: 4rem; margin-bottom: 1rem; }

        /* ================= 響應式 ================= */
        .menu-toggle { display: none; background: none; border: none; font-size: 1.5rem; color: var(--text-main); cursor: pointer; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -300px; height: 100%; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
            .sidebar.open { left: 0; }
            .menu-toggle { display: block; }
        }

        /* 小動畫 */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body>

    <!-- 左側導覽列 -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>生態檢核實務訓練</h2>
            <div class="progress-container">
                <div class="progress-text">
                    <span>學習進度</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>
            </div>
        </div>
        <ul class="nav-list" id="nav-list">
            <!-- JS 動態生成單元列表 -->
        </ul>
    </nav>

    <!-- 右側主內容 -->
    <main class="main-content">
        <!-- 頂部工具列 -->
        <header class="topbar">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button class="menu-toggle" id="menu-toggle">☰</button>
                <h3 style="margin:0; color: var(--text-main);">自主學習系統儀表板</h3>
            </div>
            <div>
                <button class="theme-toggle" id="theme-toggle" title="切換深淺色模式">🌙</button>
            </div>
        </header>

        <!-- 內容區 -->
        <div class="content-area" id="content-area">
            <div class="container fade-in" id="dynamic-content">
                <!-- 歡迎頁面 -->
                <div class="card" style="text-align: center; padding: 4rem 2rem;">
                    <h1 style="font-size: 2rem; margin-bottom: 1rem;">歡迎來到生態檢核培訓中心</h1>
                    <p style="font-size: 1.1rem; color: var(--text-muted); max-width: 600px; margin: 0 auto 2rem;">
                        本系統專為工程顧問公司新進人員設計。我們將帶你具備批判性思考，跳脫純工程思維，學習如何將生態保育融入工程生命週期中。<br>準備好成為跨域專業人才了嗎？
                    </p>
                    <button class="btn btn-primary" onclick="app.loadUnit(0)" style="font-size: 1.2rem; padding: 0.8rem 2rem;">開始學習第一單元</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ================= 資料層：20個核心單元 =================
        const courseData = [
            {
                title: "單元 1：為什麼要生態檢核？制度與政策背景",
                objectives: ["理解生態檢核的核心精神與政策發展", "釐清生態檢核與環境影響評估(環評)的差異"],
                core: "生態檢核並非為了「阻擋工程」，而是依據《公共工程生態檢核注意事項》，在工程計畫的生命週期中，強制導入生態專業。其精神在於「資訊公開、民眾參與、生態專業介入」，促成工程與環境的雙贏。不同於環評針對大型開發，生態檢核更著重於日常中小型公共工程的把關。",
                scenario: "某地方政府欲整治一條野溪，工程師原圖方便規劃全斷面混凝土護岸。因為政策要求執行生態檢核，生態團隊在設計初期即介入，發現該處為特有種魚類棲地，最終說服工程端改用石材與天然底質，成功保全棲地。",
                mistakes: "最大的迷思：把生態檢核當作「寫報告交差」的橡皮圖章，或者誤以為它等同於門檻極高的環評程序。",
                quiz: {
                    question: "關於生態檢核的核心精神，下列何者敘述「錯誤」？",
                    options: [
                        "旨在將生態保育思維融入工程生命週期",
                        "主要目的是為了全面阻擋公共工程開發",
                        "強調資訊公開與民眾參與",
                        "要求生態專業人員提早介入工程規劃"
                    ],
                    answer: 1 // B
                }
            },
            {
                title: "單元 2：工程生命週期與生態檢核介入時機",
                objectives: ["熟悉工程四大生命週期", "掌握各階段生態檢核的重點任務"],
                core: "工程生命週期分為四階段：<br>1. <b>計畫階段</b>：資料蒐集、確認是否迴避敏感區。<br>2. <b>設計階段</b>：進行現地調查，設計生態友善措施（減輕/縮小）。<br>3. <b>施工階段</b>：落實友善措施，異常狀況停工與通報。<br>4. <b>維護管理階段</b>：成效追蹤與棲地復育觀察。<br><b>黃金準則：生態介入越早，工程變更成本越低！</b>",
                scenario: "一條公路拓寬案在「施工階段」才發現挖到保育類植物，導致全面停工、變更設計，損失數百萬。若在「計畫階段」套疊圖資或「設計階段」詳實調查，便可提早微調路線避開。",
                mistakes: "設計都快發包了才找生態人員來「背書」，此時工程配置已定，生態只能做微不足道的補救。",
                quiz: {
                    question: "為了達到最佳的生態保育與工程經濟效益，生態專業最理想的介入時機是？",
                    options: ["完工後的維護管理階段", "施工機具進場時", "計畫與規劃初期階段", "細部設計完成準備發包時"],
                    answer: 2 // C
                }
            },
            {
                title: "單元 3：踩進工地前：生態敏感區位與圖資判讀",
                objectives: ["學會使用政府開放圖資", "判別工程是否座落於法定生態敏感區"],
                core: "在出發現地前，必須進行「室內作業」。利用 GIS 軟體（如 QGIS）或「環境敏感地區查詢系統」，套疊工程範圍（KML/SHP）。需確認的敏感區包含：國家公園、野生動物保護區、重要棲息環境、保安林、特定水土保持區等。若落入特定範圍，可能有禁建或嚴格開發限制。",
                scenario: "承辦人員拿到一個水電管線工程，直接去現場看覺得「只是普通的草地」。結果圖資一套疊，發現是「石虎重要棲息環境」，後續的調查強度與友善措施層級瞬間拉高。",
                mistakes: "未經圖資套疊就盲目去現場調查，可能漏看大尺度的空間限制，或者做白工（該地其實是法定禁建區）。",
                quiz: {
                    question: "工程開始前，查核「生態敏感區位」最有效率的工具或方法是？",
                    options: ["直接打電話問當地里長", "使用 GIS 軟體套疊政府開放環境敏感圖資", "去現場看有沒有野生動物", "在 Google Map 上看有沒有綠色的地方"],
                    answer: 1
                }
            },
            {
                title: "單元 4：認識我們的鄰居：陸域與水域生態系概論",
                objectives: ["分辨陸域與水域環境的關鍵生態特徵", "理解推移帶(Ecotone)的重要性"],
                core: "<b>陸域環境</b>關注植被覆蓋度、樹冠層、孔隙地等；<b>水域環境</b>關注水質、流速、底質（泥、沙、卵石）及深潭淺瀨的交替。最重要的交界處稱為<b>水陸推移帶（如濱溪帶）</b>，這裡是生物多樣性最高、也是工程（如護岸、擋土牆）最容易破壞的地方。",
                scenario: "某溝渠改善工程將原本的土溝改為「三面光」（底層與兩側皆為平滑水泥）。結果水流變急、沒有孔隙讓生物躲藏，水陸斷絕，青蛙掉進去爬不出來，形成生態陷阱。",
                mistakes: "將水跟陸地分開看，忽略了「邊緣效應」。工程切斷了水生動物上岸產卵、陸生動物下水喝水的廊道。",
                quiz: {
                    question: "關於「水陸推移帶(濱溪帶)」在生態檢核中的重要性，下列敘述何者正確？",
                    options: ["生物種類最少，工程可以直接開發", "通常是廢棄物堆積處，無生態價值", "是連接水域與陸域的重要廊道，生物多樣性高，應盡量保留自然狀態", "為了防洪，應全面鋪設不透水混凝土"],
                    answer: 2
                }
            },
            {
                title: "單元 5：調查先修班：植物與鳥類基礎調查",
                objectives: ["掌握植物相樣區調查法", "掌握鳥類沿線鳴聲與目擊調查法"],
                core: "<b>植物調查</b>通常採用「樣區法」，劃定一定面積（如10x10m），記錄喬木、灌木、草本的種類、胸高直徑(DBH)與覆蓋度，能反映棲地現況。<b>鳥類調查</b>多用「沿線調查法」或「圓圈半徑法」，清晨是最佳時機，高度依賴調查員對鳥音(鳴唱/叫聲)的辨識能力。",
                scenario: "工程預定地有一排老樹。植物調查不只記下「有樹」，還記錄了樹種、直徑，發現其中一棵為受保護樹木，工程設計因此微調路線，原地保留老樹。",
                mistakes: "植物調查只看花草，忽略了大樹的樹冠層；鳥類調查選在正中午大太陽下進行（鳥都躲起來了），導致數據掛零。",
                quiz: {
                    question: "進行鳥類生態調查時，哪一個時段通常是鳥類最活躍、最容易記錄到數據的黃金時間？",
                    options: ["正中午 12:00", "清晨日出後兩小時內", "下午 14:00", "深夜 00:00"],
                    answer: 1
                }
            },
            {
                title: "單元 6：調查進階班：兩棲爬蟲與哺乳類基礎調查",
                objectives: ["了解兩爬夜間調查法(夜探)", "認識哺乳類自動相機與痕跡調查法"],
                core: "<b>兩棲爬蟲類</b>多為夜行性，需配戴頭燈進行「夜間穿越線調查」，藉由反光（Eye shine）、鳴聲（特別是蛙類）來尋找。<b>中大型哺乳類</b>生性機警難目擊，主要仰賴架設「紅外線自動相機」，或記錄排遺、足印、食痕、獸徑等「痕跡調查」。",
                scenario: "白天在山區道路預定地勘查甚麼都沒看到。調查員架設自動相機一個月後，拍到了食蟹獴與穿山甲在夜間頻繁利用該處的乾溝移動。工程隨後加入了地下動物通道設計。",
                mistakes: "只安排白天現勘，就斷定該地區「沒有野生動物」，忽略了夜行性動物的存在。",
                quiz: {
                    question: "對於機警、難以直接目擊的中大型野生哺乳動物（如山羌、石虎），最常用且干擾最低的調查工具是？",
                    options: ["紅外線自動相機", "大型捕獸夾", "空拍機近距離追蹤", "大聲廣播吸引牠們"],
                    answer: 0
                }
            },
            {
                title: "單元 7：重點對象：保育類、外來種與指標物種辨識",

                    question: "施工期間，若怪手司機挖到一個巢穴，裡面有疑似保育類的穿山甲，現場人員應立即採取什麼行動？",
                    options: ["趕快把牠抓去賣", "當作沒看到繼續挖", "立即暫停該區施工，設置封鎖線，並通報生態檢核人員或相關單位", "拍照發臉書，然後繼續施工"],
                    answer: 2
                }
            },
            {
                title: "單元 19：完工不是結束：維護管理階段的生態追蹤",
                objectives: ["理解後續監測的重要性", "評估生態友善措施的實際成效"],
                core: "工程完工啟用後，需進行 1~3 年的「生態監測」。<br>目標：<br>1. <b>驗證對策成效</b>：架設自動相機看動物有沒有走我們設計的通道。<br>2. <b>植栽復育狀況</b>：種下去的樹有沒有活？是否被外來種入侵？<br>如果發現通道設計不良動物不走，可作為未來其他工程設計的修正依據（Adaptive Management，適應性管理）。",
                scenario: "監測人員發現動物通道內積水嚴重，導致動物不願意走。經過回報，工程單位派人清淤並改善排水，通道才恢復功能。",
                mistakes: "完工剪綵後就完全不管，導致耗資百萬的生態池變成一攤死水，或者種的樹死光變成荒地。",
                quiz: {
                    question: "為什麼工程完工後，還需要進行維護管理階段的「生態監測」？",
                    options: ["因為合約規定要消耗預算", "為了驗證生態友善設施是否真正發揮功效，並作為後續改善依據", "為了找碴開罰單", "只是為了寫學術論文"],
                    answer: 1
                }
            },
            {
                title: "單元 20：擁抱科技：數位工具、AI輔助與自動化流程",
                objectives: ["💡特別篇：發揮你的工程/行政跨域能力", "認識 AI 與自動化在生態檢核的應用"],
                core: "身為喜歡自動化流程的妳，這裡大有可為！<br>1. <b>資料自動化</b>：用 Python 或 Power Automate 將現場 App 蒐集的數據自動拋轉成報告表格。<br>2. <b>AI 影像辨識</b>：訓練模型自動過濾數萬張自動相機照片，標記動物種類。<br>3. <b>無人機(UAV)與 LiDAR</b>：建建立 3D 模型，精準計算土方量與植被覆蓋度。<br>跳脫傳統「純手工」生態調查，運用科技解決顧問業的人力瓶頸！",
                scenario: "以前助理每個月要花三天時間看自動相機照片並打字建檔。妳寫了一支 Python 腳本，串接開源的 AI 辨識模型，一小時內完成 90% 的照片分類，並自動產出 Excel 樞紐分析表，讓團隊驚豔。",
                mistakes: "抗拒學習新工具，認為生態調查只能靠傳統紙筆與肉眼，導致行政作業繁瑣、效率低下。",
                quiz: {
                    question: "身為具備創新思維的新一代生態人員，面對每個月數萬張的自動相機監測照片，最有效率的處理方式是？",
                    options: ["全部印出來一張一張用肉眼看", "導入 AI 影像辨識技術進行初步篩選，並利用程式自動化產出報表", "隨便挑幾張看就好，其他刪掉", "外包給不知名的工讀生隨便打"],
                    answer: 1
                }
            }
        ];

        // ================= 狀態管理 =================
        const appState = {
            currentUnit: 0,
            completedUnits: JSON.parse(localStorage.getItem('ecoCheckProgress')) || [],
            theme: localStorage.getItem('ecoCheckTheme') || 'light'
        };

        // ================= DOM 元素 =================
        const dom = {
            navList: document.getElementById('nav-list'),
            dynamicContent: document.getElementById('dynamic-content'),
            progressBar: document.getElementById('progress-bar'),
            progressPercent: document.getElementById('progress-percent'),
            themeToggle: document.getElementById('theme-toggle'),
            sidebar: document.getElementById('sidebar'),
            menuToggle: document.getElementById('menu-toggle')
        };

        // ================= 應用程式邏輯 =================
        const app = {
            init() {
                this.applyTheme(appState.theme);
                this.renderSidebar();
                this.updateProgress();
                this.bindEvents();
                // 預設不自動載入單元，讓使用者看歡迎頁，除非是接續學習
            },

            bindEvents() {
                dom.themeToggle.addEventListener('click', () => {
                    const newTheme = appState.theme === 'light' ? 'dark' : 'light';
                    this.applyTheme(newTheme);
                });

                dom.menuToggle.addEventListener('click', () => {
                    dom.sidebar.classList.toggle('open');
                });
            },

            applyTheme(theme) {
                appState.theme = theme;
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('ecoCheckTheme', theme);
                dom.themeToggle.innerText = theme === 'light' ? '🌙' : '☀️';
            },

            renderSidebar() {
                dom.navList.innerHTML = '';
                courseData.forEach((unit, index) => {
                    const li = document.createElement('li');
                    const isCompleted = appState.completedUnits.includes(index);
                    const isActive = appState.currentUnit === index;
                    
                    li.className = `nav-item ${isCompleted ? 'completed' : ''} ${isActive ? 'active' : ''}`;
                    // 針對多行文字微調對齊方式
                    li.style.alignItems = 'flex-start'; 
                    li.onclick = () => {
                        this.loadUnit(index);
                        if(window.innerWidth <= 768) dom.sidebar.classList.remove('open');
                    };
                    
                    // 將 unit.title.split('：')[0] 改為完整的 unit.title，並加上行高讓多行文字更好閱讀
                    li.innerHTML = `
                        <span class="nav-item-icon" style="margin-top: 2px;">${isCompleted ? '☑' : '☐'}</span>
                        <span style="line-height: 1.4;">${unit.title}</span>
                    `;
                    dom.navList.appendChild(li);
                });
            },

            updateProgress() {
                const total = courseData.length;
                const completed = appState.completedUnits.length;
                const percent = Math.round((completed / total) * 100);
                
                dom.progressBar.style.width = `${percent}%`;
                dom.progressPercent.innerText = `${percent}%`;

                if (percent === 100) {
                    this.checkGraduation();
                }
            },

            loadUnit(index) {
                appState.currentUnit = index;
                const unit = courseData[index];
                
                // 重新渲染 Sidebar active 狀態
                this.renderSidebar();

                let objectivesHtml = unit.objectives.map(obj => `<span class="obj-tag"># ${obj}</span>`).join('');
                let optionsHtml = unit.quiz.options.map((opt, i) => `
                    <label class="quiz-option" onclick="app.checkAnswer(${index}, ${i}, this)">
                        <input type="radio" name="quiz" value="${i}"> ${opt}
                    </label>
                `).join('');

                const contentHtml = `
                    <div class="fade-in">
                        <h2 style="font-size: 1.8rem; margin-bottom: 1.5rem;">${unit.title}</h2>
                        
                        <div class="card">
                            <div class="card-title"><i>🎯</i> <h3>學習目標</h3></div>
                            <div>${objectivesHtml}</div>
                        </div>

                        <div class="card">
                            <div class="card-title"><i>📖</i> <h3>核心概念說明</h3></div>
                            <p>${unit.core}</p>
                        </div>

                        <div class="scenario-box">
                            <h4 style="margin-top:0; color: var(--secondary);">💼 實務情境案例</h4>
                            <p style="margin:0;">${unit.scenario}</p>
                        </div>

                        <div class="alert-box">
                            <h4 style="margin-top:0; color: var(--alert-text);">⚠️ 常見錯誤提醒</h4>
                            <p style="margin:0;">${unit.mistakes}</p>
                        </div>

                        <div class="card" style="border-left: 4px solid var(--primary-light);">
                            <div class="card-title"><i>📝</i> <h3>隨堂小測驗</h3></div>
                            <p><strong>${unit.quiz.question}</strong></p>
                            <div id="quiz-options">${optionsHtml}</div>
                            <div id="quiz-feedback" class="feedback"></div>
                        </div>

                        <div class="action-bar">
                            <button class="btn btn-outline" onclick="app.loadUnit(${Math.max(0, index - 1)})" ${index === 0 ? 'disabled' : ''}>← 上一單元</button>
                            <button id="btn-complete" class="btn btn-primary" onclick="app.markCompleted(${index})" style="display: ${appState.completedUnits.includes(index) ? 'block' : 'none'};">✓ 標示為已完成並前往下一單元</button>
                            <button class="btn btn-outline" onclick="app.loadUnit(${Math.min(courseData.length - 1, index + 1)})" ${index === courseData.length - 1 ? 'disabled' : ''}>下一單元 →</button>
                        </div>
                    </div>
                `;

                dom.dynamicContent.innerHTML = contentHtml;
                
                // 如果已經完成過，顯示通過訊息
                if(appState.completedUnits.includes(index)) {
                     const feedback = document.getElementById('quiz-feedback');
                     feedback.innerText = "⭐ 您已通過此單元測驗。";
                     feedback.className = "feedback success";
                }
                
                // 回到頂部
                document.querySelector('.content-area').scrollTop = 0;
            },

            checkAnswer(unitIndex, selectedOption, labelElement) {
                if(appState.completedUnits.includes(unitIndex)) return; // 已完成不再重複作答

                const unit = courseData[unitIndex];
                const feedback = document.getElementById('quiz-feedback');
                const btnComplete = document.getElementById('btn-complete');
                const allLabels = document.querySelectorAll('.quiz-option');

                // 重置所有樣式
                allLabels.forEach(l => l.classList.remove('correct', 'wrong'));
                
                // 選中 radio
                labelElement.querySelector('input').checked = true;

                if (selectedOption === unit.quiz.answer) {
                    labelElement.classList.add('correct');
                    feedback.innerText = "✅ 答對了！非常優秀的判斷。";
                    feedback.className = "feedback success";
                    btnComplete.style.display = "block";
                    // 加一點小動畫提示可以點擊完成
                    btnComplete.classList.add('fade-in');
                } else {
                    labelElement.classList.add('wrong');
                    feedback.innerText = "❌ 答錯囉，請再仔細思考一下核心概念或實務案例喔！";
                    feedback.className = "feedback error";
                    btnComplete.style.display = "none";
                }
            },

            markCompleted(index) {
                if (!appState.completedUnits.includes(index)) {
                    appState.completedUnits.push(index);
                    localStorage.setItem('ecoCheckProgress', JSON.stringify(appState.completedUnits));
                    this.updateProgress();
                    this.renderSidebar();
                }
                
                // 前往下一單元或顯示證書
                if (index < courseData.length - 1) {
                    this.loadUnit(index + 1);
                } else {
                    this.checkGraduation();
                }
            },

            checkGraduation() {
                if (appState.completedUnits.length === courseData.length) {
                    const certHtml = `
                        <div class="fade-in certificate" style="display:block;">
                            <div class="cert-badge">🏆</div>
                            <h1 class="cert-title">結訓證書</h1>
                            <p style="font-size: 1.2rem; margin-bottom: 2rem;">
                                恭喜您完成全部 20 個單元的「生態檢核實務訓練」！
                            </p>
                            <p style="color: var(--text-muted); max-width: 600px; margin: 0 auto 2rem;">
                                您已具備跳脫傳統工程框架的視野，理解了四大保育策略，並掌握了現地調查與風險判讀的基礎。期待您未來運用科技與創新思維，在顧問業推動更高效、友善的自動化生態檢核流程！
                            </p>
                            <button class="btn btn-primary" onclick="app.resetProgress()">重新開始課程</button>
                        </div>
                    `;
                    dom.dynamicContent.innerHTML = certHtml;
                }
            },

            resetProgress() {
                if(confirm("確定要清除所有學習紀錄並重新開始嗎？")) {
                    appState.completedUnits = [];
                    localStorage.removeItem('ecoCheckProgress');
                    this.updateProgress();
                    this.renderSidebar();
                    this.loadUnit(0);
                }
            }
        };

        // 啟動應用程式
        window.onload = () => {
            app.init();
        };

    </script>
</body>
</html>
